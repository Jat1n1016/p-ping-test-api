name: Build and Deploy

on:
  workflow_dispatch:
    inputs:
      repository:
        required: true
        type: string
      branch:
        required: true
        default: develop
        type: string

jobs:
  Build-Deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ inputs.repository }}
          ref: ${{ inputs.branch }}
          token: ${{ secrets.PAT }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Maven
        uses: s4u/setup-maven-action@v1.12.0
        with:
          java-version: 17
          maven-version: 3.9.9

      - name: Build
        run: |
          mvn clean package -DskipTests

      - name: Deploy
        run: |
          mvn deploy -DmuleDeploy \
          -Dmule.env=Development \
          -DconnectedAppClientId=${{ secrets.CONNECTED_APP_CLIENT_ID }} \
          -DconnectedAppClientSecret=${{ secrets.CONNECTED_APP_CLIENT_SECRET }} \
          -DconnectedAppGrantType=client_credentials
