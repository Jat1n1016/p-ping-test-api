name: Build and Deploy

env:
  GLOBAL_CONNECTED_APP_STRING: ${{ secrets.CONNECTED_APP_STRING }}
  GLOBAL_CONNECTED_APP_CLIENT_ID: ${{ secrets.CONNECTED_APP_CLIENT_ID }}
  GLOBAL_CONNECTED_APP_CLIENT_SECRET: ${{ secrets.CONNECTED_APP_CLIENT_SECRET }}
  GLOBAL_PAT: ${{ secrets.PAT }}
  GLOBAL_TARGET: ${{ vars.TARGET }}
  GLOBAL_ENVIRONMENT: ${{ inputs.environment }}
  

on:
  workflow_dispatch:
    inputs:
      repository:
        required: true
        type: string
      branch:
        required: true
        default: develop
        type: string
      environment:
        required: true
        type: choice
        options: [DEV]
      vCore:
        required: true
        type: choice
        options: ["0.1","0.2","0.5","1"]
      replicas:
        required: true
        type: choice
        options: ["1","2"]

jobs:
  Build-Deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ inputs.repository }}
          ref: ${{ inputs.branch }}
          token: ${{ env.GLOBAL_PAT }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Maven
        uses: s4u/setup-maven-action@v1.12.0
        with:
          java-version: 17
          maven-version: 3.9.9

      - name: Build Application
        run: |
          mvn clean package -DskipTests \
          -Dmule.env=${{ env.GLOBAL_ENVIRONMENT }}

      - name: Deploy to CloudHub
        run: |
          mvn deploy \
          -DmuleDeploy=true \
          -Dmule.artifact=cloudhub \
          -DskipTests \
          -Dmule.env=${{ env.GLOBAL_ENVIRONMENT }} \
          -Dapp.vCores=${{ inputs.vCore }} \
          -Dapp.replicas=${{ inputs.replicas }} \
          -Danypoint.privatespace.name=${{ env.GLOBAL_TARGET }} \
          -DconnectedAppClientId=${{ env.GLOBAL_CONNECTED_APP_CLIENT_ID }} \
          -DconnectedAppClientSecret=${{ env.GLOBAL_CONNECTED_APP_CLIENT_SECRET }} \
          -DconnectedAppGrantType=client_credentials
